<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f3f6f8">
  <title>Italian Exam Trainer</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="app.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">A1-C2</p>
        <h1>Italian Exam Trainer</h1>
      </div>
      <nav class="tabs" aria-label="主导航">
        <button class="tab active" type="button" data-tab="vocabulary">单词本</button>
        <button class="tab" type="button" data-tab="grammar">语法精讲</button>
        <button class="tab" type="button" data-tab="exam">等级测试</button>
      </nav>
    </div>
  </header>

  <main class="app-main">
    <div id="status" class="status" role="status">加载中...</div>

    <section id="view-vocabulary" class="view active" aria-labelledby="vocabulary-title">
      <div class="view-head">
        <div>
          <h2 id="vocabulary-title">单词本</h2>
          <p>每页 15 个词，释义点击会进入未掌握复习池。</p>
        </div>
        <div class="control-row">
          <label>
            <span>等级</span>
            <select id="vocabulary-level"></select>
          </label>
          <button id="open-unmastered" class="secondary" type="button">未掌握单词</button>
        </div>
      </div>

      <div id="vocabulary-summary" class="summary"></div>
      <div id="vocabulary-content"></div>
      <div id="vocabulary-controls" class="footer-controls"></div>
    </section>

    <section id="view-grammar" class="view" aria-labelledby="grammar-title">
      <div class="view-head">
        <div>
          <h2 id="grammar-title">语法精讲</h2>
          <p>本地语法内容与离线小测，不使用 AI API。</p>
        </div>
      </div>
      <div id="grammar-content"></div>
    </section>

    <section id="view-exam" class="view" aria-labelledby="exam-title">
      <div class="view-head">
        <div>
          <h2 id="exam-title">等级测试</h2>
          <p>本地题库即时反馈，错题会进入错题集合。</p>
        </div>
      </div>
      <div id="exam-content"></div>
    </section>
  </main>
</body>
</html>
